<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>af_analysis Flask GUI</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/molstar/build/viewer/molstar.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
  <script src="https://unpkg.com/molstar/build/viewer/molstar.js"></script>
  <script>
    window.toggleCard = function(titleEl) {
      const body = titleEl.nextElementSibling;
      const collapsed = body.style.display === 'none';
      body.style.display = collapsed ? '' : 'none';
      titleEl.textContent = (collapsed ? '\u25BC ' : '\u25BA ') + titleEl.textContent.slice(2);
    };
    window.collapseCard = function(cardId) {
      const card = document.getElementById(cardId);
      if (!card) return;
      const titleEl = card.querySelector('.card-title');
      const body = card.querySelector('.card-body');
      if (!titleEl || !body) return;
      body.style.display = 'none';
      titleEl.textContent = '\u25BA ' + titleEl.textContent.replace(/^[\u25BC\u25BA] /, '');
    };
  </script>
</head>
<body>
  <div class="page">
    
    <h2>
      <img src="{{ url_for('static', filename='img/logo.jpeg') }}" alt="Logo" style="height:60px;vertical-align: middle;" />
      Af_analysis GUI
    </h2>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">

      <div class="card" id="load-card">
        <div class="card-title" onclick="toggleCard(this)">&#9658; Load dataset</div>
        <div class="card-body" style="display:none">
          <div class="toolbar" style="margin-top: 6px;">
            <div>
              <label for="directory">Results directory</label>
              <div style="display:flex; gap:6px;">
                <input id="directory" type="text" value="/home/murail/Documents/Code/af_analysis/tests/inputs/fold_2024_07_01_12_14_prot_dna_zn/" placeholder="/path/to/results" style="flex:1;" />
                <button id="browse-btn" type="button" style="background:#4b5563;">Browse…</button>
              </div>
            </div>
            <div>
              <label for="format">Format</label>
              <select id="format" style="width: 100%;">
                <option value="auto">auto</option>
                <option value="default">default</option>
                <option value="colabfold_1.5">colabfold_1.5</option>
                <option value="AF3_local">AF3_local</option>
                <option value="AF3_webserver">AF3_webserver</option>
                <option value="alphapulldown">alphapulldown</option>
                <option value="alphapulldown_full">alphapulldown_full</option>
                <option value="boltz1">boltz1</option>
                <option value="chai1">chai1</option>
                <option value="massivefold">massivefold</option>
                <option value="full_massivefold">full_massivefold</option>
              </select>
            </div>
            <button id="load-btn" type="button">Load dataset</button>
          </div>
          <div id="load-progress" style="display:none; margin-top:6px;">
            <div style="font-size:12px; color:#2d3a57; margin-bottom:3px;" id="load-progress-label"></div>
            <div style="background:#e5e7eb; border-radius:6px; overflow:hidden; height:10px;">
              <div id="load-progress-bar" style="height:10px; width:0%; background:#1843bf; border-radius:6px; transition:width 0.1s;"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="card" id="compute-card">
        <div class="card-title" onclick="toggleCard(this)">&#9658; Compute scores</div>
        <div class="card-body" style="display:none">
          <div style="margin-top:8px; display:flex; flex-direction:column; gap:8px;">
            <label style="display:flex; align-items:center; gap:6px; font-size:13px;">
              <input type="checkbox" id="compute-pdockq2" /> pdockq2
            </label>
            <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
              <label style="display:flex; align-items:center; gap:6px; font-size:13px;">
                <input type="checkbox" id="compute-LIS" /> LIS matrix
              </label>
              <label style="display:flex; align-items:center; gap:4px; font-size:12px; color:#555;" title="PAE cutoff for LIS">
                PAE:
                <input type="range" id="lis-pae-cutoff" min="5" max="30" step="0.5" value="12" style="width:70px; cursor:pointer;"
                  oninput="document.getElementById('lis-pae-cutoff-val').textContent = parseFloat(this.value).toFixed(1) + ' Å'">
                <span id="lis-pae-cutoff-val" style="min-width:34px;">12.0 Å</span>
              </label>
            </div>
            <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
              <label style="display:flex; align-items:center; gap:6px; font-size:13px;">
                <input type="checkbox" id="compute-LIA" /> cLIS/LIA matrix
              </label>
              <label style="display:flex; align-items:center; gap:4px; font-size:12px; color:#555;" title="PAE cutoff for LIA">
                PAE:
                <input type="range" id="lia-pae-cutoff" min="5" max="30" step="0.5" value="12" style="width:70px; cursor:pointer;"
                  oninput="document.getElementById('lia-pae-cutoff-val').textContent = parseFloat(this.value).toFixed(1) + ' Å'">
                <span id="lia-pae-cutoff-val" style="min-width:34px;">12.0 Å</span>
              </label>
              <label style="display:flex; align-items:center; gap:4px; font-size:12px; color:#555;" title="Distance cutoff for LIA">
                Dist:
                <input type="range" id="lia-dist-cutoff" min="4" max="20" step="0.5" value="8" style="width:70px; cursor:pointer;"
                  oninput="document.getElementById('lia-dist-cutoff-val').textContent = parseFloat(this.value).toFixed(1) + ' Å'">
                <span id="lia-dist-cutoff-val" style="min-width:34px;">8.0 Å</span>
              </label>
            </div>
            <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
              <label style="display:flex; align-items:center; gap:6px; font-size:13px;">
                <input type="checkbox" id="compute-iptm_d0" /> ipSAE
              </label>
              <label style="display:flex; align-items:center; gap:4px; font-size:12px; color:#555;" title="PAE cutoff for ipSAE">
                PAE:
                <input type="range" id="ipsae-pae-cutoff" min="5" max="30" step="0.5" value="10" style="width:70px; cursor:pointer;"
                  oninput="document.getElementById('ipsae-pae-cutoff-val').textContent = parseFloat(this.value).toFixed(1) + ' \u00c5'">
                <span id="ipsae-pae-cutoff-val" style="min-width:34px;">10.0 Å</span>
              </label>
            </div>
            <div>
              <button id="compute-btn" type="button">Compute</button>
            </div>
          </div>
          <div class="status" id="compute-status"></div>
          <div id="compute-progress" style="display:none; margin-top:6px;">
            <div style="font-size:12px; color:#2d3a57; margin-bottom:3px;" id="progress-label"></div>
            <div style="background:#e5e7eb; border-radius:6px; overflow:hidden; height:10px;">
              <div id="progress-bar" style="height:10px; width:0%; background:#1843bf; border-radius:6px; transition:width 0.1s;"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
    <div class="status" id="status">Load a dataset to begin.</div>

    <div class="layout" id="layout">
      <div class="card table-wrap">
        <div><strong>Dataset</strong></div>
        <table id="dataset-table">
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
      <div class="splitter" data-split="1"></div>
      <div class="card">
        <div style="display:flex; align-items:center; gap:12px;">
          <strong>Plot</strong>
          <select id="plot-type" style="font-size:12px; padding:2px 4px; border:1px solid #bfc7dc; border-radius:6px;">
            <option value="plddt">pLDDT</option>
            <option value="pae">PAE</option>
            <option value="lis" id="opt-lis" style="display:none">LIS matrix</option>
            <option value="lia" id="opt-lia" style="display:none">cLIS (LIA) matrix</option>
            <option value="iptm_d0_matrix" id="opt-iptm-d0" style="display:none">ipTM d0 matrix</option>
            <option value="ipsae_matrix" id="opt-ipsae" style="display:none">ipSAE matrix</option>
          </select>
        </div>
        <div id="plddt-plot"></div>
        <div id="selected-residues" class="mono"></div>
      </div>
      <div class="splitter" data-split="3"></div>
      <div class="card">
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
          <strong>Mol*</strong>
          <label style="font-size:12px; font-weight:normal; display:flex; align-items:center; gap:4px;">
            <input type="checkbox" id="auto-focus" checked />
            Auto-focus selection
          </label>
          <label style="font-size:12px; font-weight:normal; display:flex; align-items:center; gap:4px;">
            Color:
            <select id="color-scheme" style="font-size:12px; padding:2px 4px; border:1px solid #bfc7dc; border-radius:6px;">
              <option value="chain-id">Chain</option>
              <option selected="selected" value="af-plddt">pLDDT</option>
              <option value="sequence-id">Sequence ID</option>
              <option value="element-symbol">Element</option>
              <option value="secondary-structure">Secondary structure</option>
            </select>
          </label>
          <button id="clear-selection-btn" type="button" style="font-size:12px; padding:2px 8px; border:1px solid #bfc7dc; border-radius:6px; background:#f3f4f6; cursor:pointer;">Clear selection</button>
        </div>
        <div id="molstar-viewer"></div>
        <div id="molstar-note" class="status mono"></div>
      </div>
    </div>
  </div>

  <!-- Directory browser modal -->
  <div id="browse-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:12px; padding:20px; width:560px; max-width:92vw; max-height:80vh; display:flex; flex-direction:column; gap:10px; box-shadow:0 8px 32px rgba(0,0,0,0.25);">
      <div style="display:flex; align-items:center; justify-content:space-between;">
        <strong>Select directory</strong>
        <button id="browse-cancel" type="button" style="background:none; border:none; font-size:18px; cursor:pointer; color:#666">&times;</button>
      </div>
      <div style="display:flex; align-items:center; gap:6px;">
        <button id="browse-up" type="button" style="background:#4b5563; color:#fff; border:none; border-radius:6px; padding:4px 10px; cursor:pointer;">&#x2191; Up</button>
        <code id="browse-path" style="font-size:12px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></code>
      </div>
      <ul id="browse-list" style="list-style:none; margin:0; padding:0; flex:1; overflow-y:auto; border:1px solid #d7dceb; border-radius:8px; max-height:40vh;"></ul>
      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button id="browse-select" type="button" style="background:#1843bf; color:#fff; border:none; border-radius:8px; padding:8px 18px; cursor:pointer; font-weight:600;">Select this folder</button>
        <button id="browse-cancel2" type="button" style="background:#e5e7eb; border:none; border-radius:8px; padding:8px 14px; cursor:pointer;">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
